name: MAIK 117.50.91.230 CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: 117.50.91.230
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/maik/backend
            git pull origin main
            npm install
            npm run build
            pm2 restart 0
            
            cd /var/www/maik/frontend-new
            git pull origin main
            npm install
            npm run build
            pm2 restart 3
